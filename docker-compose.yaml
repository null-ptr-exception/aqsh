services:
  redis:
    image: redis:7-alpine

  aqsh:
    build: .
    environment:
      AQSH_MODE: both
      AQSH_REDIS_ADDR: redis:6379
    volumes:
      - ./hooks.yaml:/etc/aqsh/hooks.yaml:ro
      - ./scripts:/scripts:ro
    depends_on:
      - redis

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      AQSH_REDIS_ADDR: redis:6379
      DEV_CONTAINER: "true"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - redis
    profiles:
      - dev
